[workspace]
members = [
    "crates/xmux-core",
    "crates/xmux-platform",
]
resolver = "2"

[workspace.dependencies]
xmux-core = { path = "crates/xmux-core" }
xmux-platform = { path = "crates/xmux-platform" }

uuid = { version = "1", features = ["v4", "serde"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
dirs = "6"

[package]
name = "xmux"
version = "0.1.0"
edition = "2021"

[dependencies]
iced = "0.14"
xmux-core.workspace = true
xmux-platform.workspace = true
